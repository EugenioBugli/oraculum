# Field Viewer Configuration

# Which field file to load (relative to the fields/ directory)
# Options: fieldAdultSize.yaml | fieldRCAP.yaml | fieldSPL.yaml
field: fieldAdultSize.yaml

display:
  # Field surface color
  field_color: "#3a7d44"
  # Border strip between field and surroundings (distance in metres)
  border_color: "#2d6b35"
  border_width: 1.0
  # Area surrounding the field
  surround_color: "#1e3d1e"
  # Line color
  line_color: "white"
  # Goal color
  goal_color: "#cccccc"
  # Ball color
  ball_color: "white"
  # Penalty mark color (uses line_color if not set)
  penalty_mark_color: "white"

  # Show optional elements
  show_ball: true
  show_goals: true
  show_dimensions_label: true

  # Window title
  title: "Oraculum"

socket:
  enabled: true        # set to true to receive live data via UDP
  host: "0.0.0.0"      # bind address (0.0.0.0 = all interfaces)
  port: 10006

game_controller:
  enabled: true        # set to true to receive GameController state via UDP
  host: "0.0.0.0"
  port: 3838
  own_team: 19       # set to your team number to track own team index

agents:
  count: 7      # number of animated agents
  speed: 1.5    # base speed in m/s
  colors:
    - "#822433"   # sap red rgb(130, 36, 51)
    - "#006778"   # sap blue rgb(0, 103, 120)
    - "#000000"   # black
    - "#ffffff"   # white
